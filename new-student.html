<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Application</title>
    <link rel="shortcut icon" href="../images/advisorylogo no stroke .png" type="image/x-icon">
    <!-- local style -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- style bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body class="bg-light">
    <div class="container d-flex justify-content-start py-5">
        <div class="w-50 p-4 m-auto bg-white ">
            <h2 class="text-center mb-4">Fill Application</h2>
            <form>
                <div class="mb-2">
                    <label class="form-label">First Name:</label>
                    <input type="text" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">Middle Name:</label>
                    <input type="text" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">Last Name:</label>
                    <input type="text" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">E-Mail:</label>
                    <input type="email" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">Phone Number:</label>
                    <input type="tel" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">Address:</label>
                    <input type="text" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">College:</label>
                    <select class="form-select">
                        <option selected>Choose...</option>
                        <option value="cs">Computer Science & Artificial Intelligence</option>
                        <option value="eng">Engineering</option>
                        <option value="med">Medicine</option>
                    </select>
                </div>
    
                <div class="mb-2">
                    <label class="form-label">Date of Birth:</label>
                    <input type="date" class="form-control">
                </div>
    
                <div class="mb-2">
                    <label class="form-label">Gender:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="male">
                        <label class="form-check-label">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="female">
                        <label class="form-check-label">Female</label>
                    </div>
                </div>
                <div class="text-start">
                    <button type="button" onclick="alert('Data Sent Successfully')" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>
    <!-- local js -->
    <script src=""></script>
    <!-- js bootstrap 5.3 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/3414da49bf.js" crossorigin="anonymous"></script>
</body>

</html>
